apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # Webhook service — posts to quigley-api
  service.webhook.quigley: |
    url: https://api.alix.lol/argocd
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: Basic YXJnb2NkOnhicWc5dWp5aVAtZVVCUXJ6QnRNalhGckxkaDZmdkN6

  # Shared payload template used by all triggers
  template.app-sync-succeeded: |
    webhook:
      quigley:
        method: POST
        body: |
          {
            "app_name": {{.app.metadata.name | toJson}},
            "project": {{.app.spec.project | toJson}},
            "sync_status": {{.app.status.sync.status | toJson}},
            "health_status": {{.app.status.health.status | toJson}},
            "operation_phase": {{.app.status.operationState.phase | toJson}},
            "operation_message": {{.app.status.operationState.message | toJson}},
            "repo_url": {{.app.spec.source.repoURL | toJson}},
            "target_revision": {{.app.spec.source.targetRevision | toJson}},
            "sync_revision": {{.app.status.sync.revision | toJson}}
          }

  template.app-sync-failed: |
    webhook:
      quigley:
        method: POST
        body: |
          {
            "app_name": {{.app.metadata.name | toJson}},
            "project": {{.app.spec.project | toJson}},
            "sync_status": {{.app.status.sync.status | toJson}},
            "health_status": {{.app.status.health.status | toJson}},
            "operation_phase": {{.app.status.operationState.phase | toJson}},
            "operation_message": {{.app.status.operationState.message | toJson}},
            "repo_url": {{.app.spec.source.repoURL | toJson}},
            "target_revision": {{.app.spec.source.targetRevision | toJson}},
            "sync_revision": {{.app.status.sync.revision | toJson}}
          }

  template.app-health-degraded: |
    webhook:
      quigley:
        method: POST
        body: |
          {
            "app_name": {{.app.metadata.name | toJson}},
            "project": {{.app.spec.project | toJson}},
            "sync_status": {{.app.status.sync.status | toJson}},
            "health_status": {{.app.status.health.status | toJson}},
            "operation_phase": {{.app.status.operationState.phase | toJson}},
            "operation_message": {{.app.status.operationState.message | toJson}},
            "repo_url": {{.app.spec.source.repoURL | toJson}},
            "target_revision": {{.app.spec.source.targetRevision | toJson}},
            "sync_revision": {{.app.status.sync.revision | toJson}}
          }

  # Triggers
  trigger.on-sync-succeeded: |
    - when: app.status.operationState != nil && app.status.operationState.phase in ['Succeeded'] && app.status.health.status == 'Healthy'
      oncePer: app.status.operationState.syncResult.revision
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState != nil && app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # Default subscriptions — applies to all apps without per-app annotations
  subscriptions: |
    - recipients:
        - quigley
      triggers:
        - on-sync-succeeded
        - on-sync-failed
        - on-health-degraded

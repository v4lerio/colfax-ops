apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devpi
spec:
  project: default
  source:
    repoURL: 'git@github.com:politeauthority/private-ops.git'
    path: devpi/
    targetRevision: main
  destination:
    namespace: devpi
    name: in-cluster
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

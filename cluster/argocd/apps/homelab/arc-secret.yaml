apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-secret
spec:
  project: default
  source:
    repoURL: 'git@github.com:politeauthority/private-ops.git'
    path: arc/secret
    targetRevision: main
  destination:
    namespace: arc-runners
    name: in-cluster
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

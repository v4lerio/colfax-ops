apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ip-sentry
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/politeauthority/ip-sentry.git'
      path: .
      targetRevision: main
      helm:
        valueFiles:
          - $values/ip-sentry/values-colfax.yaml
    - repoURL: 'git@github.com:politeauthority/private-ops.git'
      targetRevision: main
      ref: values
  destination:
    namespace: ip-sentry
    name: in-cluster
  syncPolicy:
    # automated:
    #   selfHeal: true
    # syncOptions:
    #   - CreateNamespace=true
    #   - ServerSideApply=true
